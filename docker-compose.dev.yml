services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - ./secrets/Mikoshi.env
    environment:
      - VITE_API_BASE_URL=http://localhost
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    env_file:
      - ./secrets/Mikoshi.env
    environment:
      - DATABASE_URL=postgresql://tinybooger:473k979k@host.docker.internal:5432/mikoshidb
      - FRONTEND_BASE_URL=http://localhost
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - backend_static:/app/static/images
    depends_on:
      redis:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"



  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/mikoshi.conf.dev:/etc/nginx/conf.d/mikoshi.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  backend_static:
  redis_data:
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- 阿里云人机验证码配置 -->
  <script>
    window.AliyunCaptchaConfig = {
      region: "cn",
      prefix: "yywvva",
    };
  </script>
  <script
    type="text/javascript"
    src="https://o.alicdn.com/captcha-frontend/aliyunCaptcha/AliyunCaptcha.js"
  ></script>
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"/>
  <title>语伴岛 - 与你感兴趣的角色聊天吧</title>
  <!-- Subtle light-lavender theme color for browser UI on mobile -->
  <meta name="theme-color" content="#f5f5f7" />
  <!-- Prevent password managers from triggering layout shift -->
  <meta name="password-managers" content="false" />
  <!-- Favicon and app icons (placed in frontend/public/) -->
  <link rel="icon" href="/favicon.ico" />
  <!-- Apple Touch Icon (iOS home screen shortcut / Chrome iOS) -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <!-- Web App Manifest (Android + PWA install for all platforms) -->
  <link rel="manifest" href="/manifest.json" />
</head>
<body>
  <style>
    /* Fix scrolling issues on iOS */
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    body {
      /*
        Elegant, muted lavender on white:
        - Keep most of the canvas white
        - Add a lavender glow at the bottom and softly on both sides (more visible)
      */
      background-color: #f5f5f7;
      background-image: none;
      width: 100%;
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    
    #root {
      width: 100%;
      height: 100%;
    }
  </style>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
